<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatrice Impasto Pizza</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            font-size: 16px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
        }

        .section {
            margin-bottom: 40px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border-left: 4px solid #667eea;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: "⚙️";
            font-size: 24px;
        }

        .results-section .section-title::before {
            content: "📊";
        }

        .input-grid {
            display: grid;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 500;
            color: #34495e;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-wrapper input {
            border: none;
            outline: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 500;
            flex: 1;
            background: transparent;
            text-align: right;
        }

        .input-wrapper .unit {
            padding: 15px;
            font-weight: 600;
            color: #6c757d;
            font-size: 14px;
            background: #f8f9fa;
            border-radius: 0 8px 8px 0;
            min-width: 60px;
            text-align: center;
        }

        .results-grid {
            display: grid;
            gap: 15px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .result-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .result-label {
            font-weight: 500;
            color: #2c3e50;
            text-transform: capitalize;
        }

        .result-value {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 18px;
            color: #667eea;
        }

        .result-unit {
            font-size: 14px;
            color: #6c757d;
            font-weight: 500;
        }

        .export-section {
            margin-top: 30px;
            text-align: center;
        }

        .export-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
            justify-content: center;
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .export-btn:active {
            transform: translateY(0);
        }

        .export-btn.loading {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .export-btn.success {
            background: #27ae60;
        }

        .btn-icon {
            font-size: 18px;
        }

        /* Responsive Design */
        @media (min-width: 768px) {
            .input-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .results-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .input-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .results-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Animazioni */
        .result-item {
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Canvas per esportazione (nascosto) */
        #exportCanvas {
            display: none;
        }

        /* Stili per il toast di notifica */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-weight: 500;
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍕 Calcolatrice Pizza</h1>
            <p>Calcola le dosi perfette per il tuo impasto</p>
        </div>

        <div class="content">
            <div class="section">
                <h2 class="section-title">Parametri di Input</h2>
                <div class="input-grid">
                    <div class="input-group">
                        <label for="numPizze">Numero pizze</label>
                        <div class="input-wrapper">
                            <input type="number" id="numPizze" value="3" min="1" max="50">
                            <span class="unit">pz</span>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="pesoPanetto">Peso panetto</label>
                        <div class="input-wrapper">
                            <input type="number" id="pesoPanetto" value="280" min="100" max="500">
                            <span class="unit">g</span>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="idratazione">Idratazione</label>
                        <div class="input-wrapper">
                            <input type="number" id="idratazione" value="65" min="50" max="85">
                            <span class="unit">%</span>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="saleLitro">Sale per litro</label>
                        <div class="input-wrapper">
                            <input type="number" id="saleLitro" value="10" min="0" max="30">
                            <span class="unit">g/L</span>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="olioLitro">Olio per litro</label>
                        <div class="input-wrapper">
                            <input type="number" id="olioLitro" value="0" min="0" max="50">
                            <span class="unit">g/L</span>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="oreTotali">Ore totali</label>
                        <div class="input-wrapper">
                            <input type="number" id="oreTotali" value="12" min="1" max="72">
                            <span class="unit">ore</span>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="oreFrigo">Ore in frigo</label>
                        <div class="input-wrapper">
                            <input type="number" id="oreFrigo" value="8" min="0" max="72">
                            <span class="unit">ore</span>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="tempAmbiente">Temp. ambiente</label>
                        <div class="input-wrapper">
                            <input type="number" id="tempAmbiente" value="20" min="15" max="30">
                            <span class="unit">°C</span>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="tempFrigo">Temp. frigorifero</label>
                        <div class="input-wrapper">
                            <input type="number" id="tempFrigo" value="5" min="2" max="10">
                            <span class="unit">°C</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section results-section">
                <h2 class="section-title">Risultati</h2>
                <div class="results-grid">
                    <div class="result-item">
                        <span class="result-label">Farina</span>
                        <div class="result-value">
                            <span id="resFarina">0</span>
                            <span class="result-unit">g</span>
                        </div>
                    </div>
                    
                    <div class="result-item">
                        <span class="result-label">Acqua</span>
                        <div class="result-value">
                            <span id="resAcqua">0</span>
                            <span class="result-unit">g</span>
                        </div>
                    </div>
                    
                    <div class="result-item">
                        <span class="result-label">Sale</span>
                        <div class="result-value">
                            <span id="resSale">0</span>
                            <span class="result-unit">g</span>
                        </div>
                    </div>
                    
                    <div class="result-item">
                        <span class="result-label">Olio</span>
                        <div class="result-value">
                            <span id="resOlio">0</span>
                            <span class="result-unit">g</span>
                        </div>
                    </div>
                    
                    <div class="result-item">
                        <span class="result-label">Lievito fresco</span>
                        <div class="result-value">
                            <span id="resLievito">0</span>
                            <span class="result-unit">g</span>
                        </div>
                    </div>
                    
                    <div class="result-item">
                        <span class="result-label">Peso totale</span>
                        <div class="result-value">
                            <span id="resPesoTotale">0</span>
                            <span class="result-unit">g</span>
                        </div>
                    </div>
                    
                    <div class="result-item">
                        <span class="result-label">W consigliato</span>
                        <div class="result-value">
                            <span id="resW">0</span>
                            <span class="result-unit">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="export-section">
                <button class="export-btn" id="exportBtn">
                    <span class="btn-icon">📸</span>
                    <span class="btn-text">Esporta Ricetta</span>
                </button>
            </div>
        </div>
    </div>

    <canvas id="exportCanvas"></canvas>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input[type="number"]');
            const exportBtn = document.getElementById('exportBtn');
            const btnText = exportBtn.querySelector('.btn-text');
            const btnIcon = exportBtn.querySelector('.btn-icon');

            function calculate() {
                const numPizze = parseFloat(document.getElementById('numPizze').value) || 0;
                const pesoPanetto = parseFloat(document.getElementById('pesoPanetto').value) || 0;
                const idratazione = parseFloat(document.getElementById('idratazione').value) || 0;
                const saleLitro = parseFloat(document.getElementById('saleLitro').value) || 0;
                const olioLitro = parseFloat(document.getElementById('olioLitro').value) || 0;
                const oreTotali = parseFloat(document.getElementById('oreTotali').value) || 1;
                const oreFrigo = parseFloat(document.getElementById('oreFrigo').value) || 0;
                const tempAmbiente = parseFloat(document.getElementById('tempAmbiente').value) || 20;
                const tempFrigo = parseFloat(document.getElementById('tempFrigo').value) || 4;

                const pesoTotale = numPizze * pesoPanetto;
                const idratazioneDec = idratazione / 100;
                const saleDec = saleLitro / 1000;
                const olioDec = olioLitro / 1000;

                const denominatore = 1 + idratazioneDec * (1 + saleDec + olioDec);
                const farina = pesoTotale / denominatore;
                const acqua = farina * idratazioneDec;
                const sale = acqua * saleDec;
                const olio = acqua * olioDec;

                const oreAmbiente = oreTotali - oreFrigo > 0 ? oreTotali - oreFrigo : 0;
                const getCoeff = (temp) => Math.pow(1.15, (temp - 10)); 
                const coeffAmbiente = getCoeff(tempAmbiente);
                const coeffFrigo = getCoeff(tempFrigo);
                const maturazionePonderata = (oreAmbiente * coeffAmbiente) + (oreFrigo * coeffFrigo);
                
                const fattoreBaseLievito = 102; 
                const lievito = maturazionePonderata > 0 ? (fattoreBaseLievito * farina / 1000) / maturazionePonderata : 0;
                const wConsigliato = 160 + (oreTotali * 4) + (oreFrigo * 2);

                document.getElementById('resFarina').textContent = farina.toFixed(0);
                document.getElementById('resAcqua').textContent = acqua.toFixed(0);
                document.getElementById('resSale').textContent = sale.toFixed(1);
                document.getElementById('resOlio').textContent = olio > 0 ? olio.toFixed(1) : '-';
                document.getElementById('resLievito').textContent = lievito > 0 ? lievito.toFixed(2) : '0.00';
                document.getElementById('resPesoTotale').textContent = pesoTotale.toFixed(0);
                document.getElementById('resW').textContent = wConsigliato.toFixed(0);

                // Animazione sui risultati
                document.querySelectorAll('.result-item').forEach((item, index) => {
                    item.style.animation = 'none';
                    item.offsetHeight; // Trigger reflow
                    item.style.animation = `fadeInUp 0.5s ease-out ${index * 0.1}s both`;
                });
            }

            function showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => toast.classList.add('show'), 100);
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => document.body.removeChild(toast), 300);
                }, 3000);
            }

            function exportToImage() {
                exportBtn.classList.add('loading');
                btnText.textContent = 'Generando...';
                btnIcon.textContent = '⏳';

                const canvas = document.getElementById('exportCanvas');
                const ctx = canvas.getContext('2d');
                
                // Impostazioni canvas
                canvas.width = 600;
                canvas.height = 800;
                
                // Sfondo
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#764ba2');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Sfondo bianco per contenuto
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(30, 80, canvas.width - 60, canvas.height - 120);
                
                // Titolo
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🍕 Ricetta Pizza', canvas.width / 2, 50);
                
                // Contenuto
                ctx.fillStyle = '#2c3e50';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('INGREDIENTI:', 60, 140);
                
                ctx.font = '18px Arial';
                let yPos = 180;
                
                // Raccolta dati
                const ingredients = [
                    { name: 'Farina', value: document.getElementById('resFarina').textContent, unit: 'g' },
                    { name: 'Acqua', value: document.getElementById('resAcqua').textContent, unit: 'g' },
                    { name: 'Sale', value: document.getElementById('resSale').textContent, unit: 'g' },
                    { name: 'Olio', value: document.getElementById('resOlio').textContent, unit: 'g' },
                    { name: 'Lievito fresco', value: document.getElementById('resLievito').textContent, unit: 'g' }
                ];
                
                ingredients.forEach(ingredient => {
                    if (ingredient.value !== '-' && ingredient.value !== '0') {
                        ctx.fillText(`• ${ingredient.name}: ${ingredient.value} ${ingredient.unit}`, 60, yPos);
                        yPos += 35;
                    }
                });
                
                // Parametri
                ctx.font = 'bold 20px Arial';
                ctx.fillText('PARAMETRI:', 60, yPos + 30);
                
                ctx.font = '16px Arial';
                yPos += 70;
                
                const params = [
                    { name: 'Pizze', value: document.getElementById('numPizze').value },
                    { name: 'Peso panetto', value: document.getElementById('pesoPanetto').value + ' g' },
                    { name: 'Idratazione', value: document.getElementById('idratazione').value + '%' },
                    { name: 'Lievitazione totale', value: document.getElementById('oreTotali').value + ' ore' },
                    { name: 'Ore in frigo', value: document.getElementById('oreFrigo').value + ' ore' },
                    { name: 'W consigliato', value: document.getElementById('resW').textContent }
                ];
                
                params.forEach(param => {
                    ctx.fillText(`• ${param.name}: ${param.value}`, 60, yPos);
                    yPos += 30;
                });
                
                // Footer
                ctx.fillStyle = '#667eea';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Generato con Calcolatrice Pizza', canvas.width / 2, canvas.height - 30);
                
                setTimeout(() => {
                    // Download
                    const link = document.createElement('a');
                    link.download = 'ricetta-pizza.png';
                    link.href = canvas.toDataURL();
                    link.click();
                    
                    // Reset button
                    exportBtn.classList.remove('loading');
                    exportBtn.classList.add('success');
                    btnText.textContent = 'Completato!';
                    btnIcon.textContent = '✓';
                    
                    showToast('Ricetta esportata con successo!');
                    
                    setTimeout(() => {
                        exportBtn.classList.remove('success');
                        btnText.textContent = 'Esporta Ricetta';
                        btnIcon.textContent = '📸';
                    }, 2000);
                }, 1000);
            }

            inputs.forEach(input => {
                input.addEventListener('input', calculate);
                input.addEventListener('focus', (e) => {
                    e.target.parentElement.style.transform = 'scale(1.02)';
                });
                input.addEventListener('blur', (e) => {
                    e.target.parentElement.style.transform = 'scale(1)';
                });
            });

            exportBtn.addEventListener('click', exportToImage);
            
            calculate();
        });
    </script>
</body>
</html>
